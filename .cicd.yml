name: Claremont Key Server Pipeline
stages:
  - name: Run Tests
    type: test
    test_dir: tests
    commands:
      - 'python -m pytest {test_dir} -v --tb=short'
    timeout: 300
    continue_on_failure: false

  - name: Build Docker Image
    type: command
    commands:
      - 'docker build -t claremont-key-server:latest .'
    timeout: 300

  - name: Deploy Key Server
    type: deploy
    commands:
      - 'docker stop claremont-key-server 2>/dev/null || true'
      - 'docker rm claremont-key-server 2>/dev/null || true'
      - 'docker compose down || true'
      - 'docker compose up -d --build'
      - 'sleep 10'
      - 'docker exec claremont-key-server curl -sf http://localhost:5001/api/v1/health'
    timeout: 300

  - name: Verify DNS
    type: python
    script: |
      import requests
      url = 'https://keys.claremontcomputer.net/login'
      try:
          resp = requests.get(url, verify=False, timeout=10)
          if resp.status_code == 200:
              logs.append(f"DNS verification passed: {url} returned {resp.status_code}")
          else:
              logs.append(f"DNS verification: {url} returned {resp.status_code}")
      except Exception as e:
          logs.append(f"DNS not yet available: {e}")
    timeout: 60
    continue_on_failure: true
