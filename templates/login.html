{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header text-center">
                <h4><i class="bi bi-shield-lock-fill"></i> Key Server Login</h4>
                <p class="text-muted mb-0">Authenticate with your Claremont email and API key</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="email" name="email" class="form-control" required placeholder="you@claremontcomputer.net">
                    </div>
                    <div class="mb-3">
                        <label>API Key</label>
                        <input type="password" name="api_key" class="form-control" required placeholder="Your Claremont API key">
                        <small class="text-muted">Get your API key from the <a href="https://github.com/claremont-computer-network/claremont" target="_blank">Claremont project</a></small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Authenticate</button>
                </form>
                <hr>
                <div class="text-center">
                    <small class="text-muted">
                        <strong>Don't have an API key?</strong><br>
                        Register at <code>pip install claremont</code> and authenticate with your email
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
